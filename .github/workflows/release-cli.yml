name: release-cli

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            targets: bun-windows-x64-baseline,bun-windows-arm64
          - os: ubuntu-latest
            targets: bun-linux-x64-baseline,bun-linux-arm64
          - os: macos-latest
            targets: bun-darwin-x64,bun-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI release assets
        run: bun run build:release --targets=${{ matrix.targets }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
